name: Build & Release APK

on:
  push:
    tags:
      - 'v[0-9]*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Validate tag format
        env:
          TAG: ${{ github.ref_name }}
        run: |
          if ! echo "$TAG" | grep -qE '^v[A-Za-z0-9._-]+$'; then
            echo "Invalid tag format: $TAG"
            exit 1
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@94baf225fe0a508e581a564467443d0e2379123b # v4.3.0

      - name: Restore signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p signing
          # 剥离 base64 中可能混入的空白/换行后再解码，避免 secret 带换行导致 jks 损坏
          printf '%s' "$KEYSTORE_BASE64" | tr -d '[:space:]' | base64 -d > signing/veya-release.jks
          # 校验解码结果是合法 JKS（魔数 FEEDFEED），否则立即失败给出明确提示
          if [ "$(head -c4 signing/veya-release.jks | xxd -p)" != "feedfeed" ]; then
            echo "::error::解码后的 keystore 不是合法 JKS（魔数不符）。请重新生成 ANDROID_KEYSTORE_BASE64："
            echo "::error::  base64 -i signing/veya-release.jks | tr -d '\\n' | pbcopy   （macOS，结果粘到 GitHub secret）"
            exit 1
          fi

      - name: Build Release APK
        env:
          KEYSTORE_PATH: signing/veya-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew :composeApp:assembleRelease

      - name: Rename APK
        env:
          TAG: ${{ github.ref_name }}
        run: |
          # Gradle 输出为 veya-{versionName}-release.apk，用通配符定位后按发布 tag 重命名
          SRC=$(ls composeApp/build/outputs/apk/release/veya-*-release.apk)
          mv "$SRC" "veya-${TAG}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: veya-${{ github.ref_name }}
          path: veya-${{ github.ref_name }}.apk
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Download APK artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: veya-${{ github.ref_name }}

      - name: Extract changelog for this version
        id: changelog
        env:
          TAG: ${{ github.ref_name }}
        run: |
          NOTES=$(awk -v tag="$TAG" '
            $0 ~ "^## \\[?" tag "\\]?" {found=1; next}
            found && /^## / {exit}
            found {print}
          ' CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="详见 [CHANGELOG](https://github.com/danweiyuancircle/veya/blob/master/CHANGELOG.md)"
          fi
          # 用随机 delimiter 防止 heredoc 注入
          DELIM="EOF_$(openssl rand -hex 16)"
          {
            echo "notes<<${DELIM}"
            echo "$NOTES"
            echo "${DELIM}"
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.notes }}
          files: veya-${{ github.ref_name }}.apk
          make_latest: true
